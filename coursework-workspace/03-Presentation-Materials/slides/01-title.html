<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Apollo - My Exit Strategy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/reveal.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root { --bg-primary: #191919; --bg-secondary: #37352f; --text-primary: #ffffff; --text-secondary: rgba(255,255,255,0.7); --accent: #f2994a; --accent-hover: #ff6b35; }
      .reveal { font-family: 'Inter', sans-serif; background: var(--bg-primary); }
      .reveal .slides { text-align: left; }
      .reveal h1 { font-size: 2.8em; color: var(--text-primary); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
      .reveal h2 { font-size: 1.8em; color: var(--text-primary); font-weight: 700; margin-bottom: 0.8em; text-transform: uppercase; letter-spacing: 0.03em; }
      .reveal h3 { font-size: 1.1em; color: var(--accent); font-weight: 600; margin-top: 1em; margin-bottom: 0.5em; }
      .reveal p, .reveal li { font-size: 0.78em; color: var(--text-secondary); line-height: 1.6; }
      .highlight { color: var(--accent) !important; font-weight: 600; }
      .accent { color: var(--accent); }
      .bold { color: var(--text-primary); font-weight: 600; }
      .small-text { font-size: 0.65em !important; color: var(--text-secondary) !important; }
      .intro-tag { display: inline-block; background: var(--accent); color: var(--bg-primary); padding: 4px 12px; border-radius: 4px; font-size: 0.5em; font-weight: 600; margin-bottom: 1em; }
      .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5em; margin-top: 1.5em; }
      .metric-card { background: var(--bg-secondary); padding: 1.2em; border-radius: 8px; border-left: 3px solid var(--accent); }
      .metric-value { font-size: 2em; font-weight: 700; color: var(--accent); line-height: 1; }
      .metric-label { font-size: 0.6em; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.3em; }
      .tagline { font-size: 1.2em; color: var(--text-primary); font-weight: 500; margin-top: 0.5em; opacity: 0.9; }
      .hook { font-size: 1em; color: var(--accent); font-weight: 600; margin-bottom: 0.5em; }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <section>
          <span class="intro-tag">TEAM APOLLO</span>
          <p class="hook">EXIT STRATEGY FOR AN AI AUTOMATION AGENCY</p>
          <h1>From Code to<br><span class="accent">AI Infrastructure</span></h1>
          <p class="tagline">Pivoting from development to building the foundation</p>

          <div class="metrics-grid">
            <div class="metric-card">
              <div class="metric-value">£2.8bn</div>
              <div class="metric-label">UK Market Size</div>
            </div>
            <div class="metric-card">
              <div class="metric-value">34%</div>
              <div class="metric-label">Annual Growth</div>
            </div>
            <div class="metric-card">
              <div class="metric-value">88%</div>
              <div class="metric-label">Skills Gap</div>
            </div>
          </div>

          <p style="margin-top: 2em;"><strong>Shaan Sisodia</strong></p>
          <p class="small-text" style="margin-top: 1.5em;">
            Reflection on Enterprising & Entrepreneurial Practice<br>
            <em>Learning by Doing</em>
          </p>
        </section>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/reveal.js"></script>
    <script>Reveal.initialize({ hash: true, slideNumber: true, controls: true, progress: true, center: false, transition: 'fade' });</script>
  </body>
</html>
